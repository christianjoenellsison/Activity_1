]<html>
<head>
<title>BOX</title>
<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0b0d;
    font-family:Arial, sans-serif;
  }

  .container{
    display:flex;
    gap:30px;
  }

  .box{
    width:260px;
    height:150px;
    background:#111;
    color:#fff;
    border:2px solid #0ff;
    box-shadow:0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    text-align:center;
    transition:0.3s ease;
  }

  .box:hover{
    box-shadow:0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
    transform:scale(1.05);
  }
</style>
</head>
<body>

<div class="container">
  <div class="box">Extreme</div>
  <div class="box">Mania</div>
</div>

</body>
</html>
